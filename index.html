<!DOCTYPE html>
<html>
<head>
  <title>PrimeNest Toys</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#fff0f5;
      text-align:center;
    }

    header{
      background:purple;
      color:white;
      padding:20px;
      font-size:32px;
      font-weight:bold;
    }

    .products{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      padding:20px;
      gap:20px;
    }

    .card{
      background:white;
      width:280px;
      border-radius:15px;
      padding:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .card img{
      width:100%;
      border-radius:10px;
      height:220px;
      object-fit:cover;
    }

    .price{
      color:purple;
      font-size:24px;
      font-weight:bold;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    .buy{
      background:purple;
    }

    .cart{
      background:pink;
    }

    .whatsapp{
      background:green;
    }

    footer{
      background:black;
      color:white;
      padding:20px;
      margin-top:30px;
    }
  </style>
</head>

<body>

<header>
  PrimeNest Toys 🧸
</header>

<h2>Popular Toys</h2>

<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1566576912321-d58ddd7a6088?q=80&w=1200&auto=format&fit=crop">
    <h3>Teddy Bear</h3>
    <p class="price">₹799</p>

    <button class="buy">Buy Now</button>

    <button class="cart">Add To Cart</button>

    <button class="whatsapp">
      Order on WhatsApp
    </button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1519677100203-a0e668c92439?q=80&w=1200&auto=format&fit=crop">
    <h3>Remote Car</h3>
    <p class="price">₹1499</p>

    <button class="buy">Buy Now</button>

    <button class="cart">Add To Cart</button>

    <button class="whatsapp">
      Order on WhatsApp
    </button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1587654780291-39c9404d746b?q=80&w=1200&auto=format&fit=crop">
    <h3>Building Blocks</h3>
    <p class="price">₹999</p>

    <button class="buy">Buy Now</button>

    <button class="cart">Add To Cart</button>

    <button class="whatsapp">
      Order on WhatsApp
    </button>
  </div>

</div>

<footer>
  Payment Methods:<br><br>

  💳 Cards | 📱 UPI | 🏦 Net Banking | 💵 Cash on Delivery
</footer>

</body>
</html>
